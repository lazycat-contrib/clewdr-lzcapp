version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/clewdr.lpk

update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: clewdr

build:
  run_buildscript: false

images:
  - id: clewdr
    target: service
    service: clewdr
    source: ghcr.io/xerxes-2/clewdr
    channel: stable
    tag_regex: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    delivery:
      mode: lazycat

stores:
  official:
    enabled: true
    skip_if_version_exists: true
  private:
    enabled: true
    skip_if_version_exists: true
    name: Clewdr
    summary: 面向 Claude 和 Gemini 的高性能 LLM 反向代理

